patterns:
  person_name_cn:
    policy_tag: pii.name
    risk_type: person_name
    severity: medium
    regex: "(?:姓名|学生|家长|监护人)[:：\\s]{0,3}([\\u4e00-\\u9fa5·]{2,8})"
    capture_group: 1
    redaction: "<NAME>"
  person_name_en:
    policy_tag: pii.name
    risk_type: person_name
    severity: medium
    regex: "(?:Name|Student|Parent|Guardian)[:：\\s]{0,3}([A-Z][a-z]+(?:\\s+[A-Z][a-z]+){0,1})"
    flags:
      - IGNORECASE
    capture_group: 1
    redaction: "<NAME>"
  email:
    policy_tag: pii.email
    risk_type: email
    severity: high
    regex: "([A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,})"
    capture_group: 1
    redaction: "<EMAIL>"
  phone_cn:
    policy_tag: pii.phone
    risk_type: phone_number
    severity: high
    regex: "((?:\\+?86[-\\s]?)?1[3-9]\\d{9})"
    capture_group: 1
    redaction: "<PHONE>"
  phone_generic:
    policy_tag: pii.phone
    risk_type: phone_number
    severity: medium
    regex: "((?:\\+?\\d{1,3}[-\\s]?)?(?:\\(?\\d{2,4}\\)?[-\\s]?)?\\d{3,4}[-\\s]?\\d{4})"
    capture_group: 1
    redaction: "<PHONE>"
  id_card_cn:
    policy_tag: pii.id_card
    risk_type: id_card
    severity: critical
    regex: "([1-9]\\d{5}(?:18|19|20)\\d{2}(?:0[1-9]|1[0-2])(?:0[1-9]|[12]\\d|3[01])\\d{3}[\\dXx])"
    capture_group: 1
    redaction: "<ID_CARD>"
  bank_card:
    policy_tag: pii.bank_card
    risk_type: bank_card
    severity: high
    regex: "((?:\\d[ -]?){16,19})"
    capture_group: 1
    redaction: "<BANK_CARD>"
  student_id:
    policy_tag: pii.student_id
    risk_type: student_id
    severity: high
    regex: "(?:学号|学生编号|student[_\\s-]?id)[:：\\s]{0,3}([A-Za-z0-9-]{4,20})"
    flags:
      - IGNORECASE
    capture_group: 1
    redaction: "<STUDENT_ID>"
  parent_contact:
    policy_tag: pii.parent_contact
    risk_type: parent_contact
    severity: high
    regex: "(?:家长(?:联系电话|电话|联系方式)|Parent(?:\\s+Contact|\\s+Phone)?)[:：\\s]{0,3}([+0-9A-Za-z@._ -]{5,40})"
    flags:
      - IGNORECASE
    capture_group: 1
    redaction: "<PARENT_CONTACT>"
  address:
    policy_tag: pii.address
    risk_type: address
    severity: high
    regex: "(?:家庭住址|住址|地址|Address)[:：\\s]{0,3}([^\\n;；]{4,80})"
    flags:
      - IGNORECASE
    capture_group: 1
    redaction: "<ADDRESS>"
  score_record:
    policy_tag: pii.education_record
    risk_type: education_record
    severity: medium
    regex: "(?:成绩单|成绩记录|report\\s+card|exam\\s+score)"
    flags:
      - IGNORECASE
    capture_group: 0
    redaction: "<EDU_RECORD>"

combination_rules:
  combined_identity:
    policy_tag: pii.combined_identity
    risk_type: combined_identity
    severity: critical
    base_types:
      - person_name
      - phone_number
      - id_card
      - address
      - student_id
      - parent_contact
      - bank_card
    redaction: "<COMBINED_IDENTITY>"
