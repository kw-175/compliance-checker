policies:
  - policy_id: content_minor_harmful_sexualization_zero_tolerance
    enabled: true
    labels:
      - content.minor_harmful.sexualization
    min_severity: low
    risk_level_code: C3
    action: P4
    training_eligibility: T3
    dataset_route: exclude_from_training
    allow_downstream_annotation: false
    requires_manual_review: false
    priority: 130
    reason: Sexualized or exploitative minor content is excluded regardless of scene.

